<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Pro Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5abf6e;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(-45deg, #622293,#b35252, #af8181, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-main); padding: 20px;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 40px; width: 100%; max-width: 850px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); position: relative; overflow: hidden;
        }

        /* Top Header with Finish Button */
        .quiz-top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .finish-btn-top {
            background: rgba(44, 211, 74, 0.2); color: #6be38f; border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.85rem;
        }
        .finish-btn-top:hover { background: #416742; color: white; }

        .progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.05); }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s ease; box-shadow: 0 0 10px var(--primary); }

        h1 { font-size: 2.2rem; font-weight: 700; background: linear-gradient(to right, #fff, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 30px 0; }
        .stat-box { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 16px; padding: 15px; text-align: center; }
        .stat-val { display: block; font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .stat-lbl { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .btn { border: none; outline: none; padding: 14px 28px; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 20px var(--primary-glow); width: 100%; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px var(--primary-glow); }
        .btn-ghost { background: transparent; border: 2px solid var(--glass-border); color: var(--text-muted); padding: 10px 20px; }
        .btn-ghost:hover { border-color: var(--text-main); color: var(--text-main); background: rgba(255,255,255,0.05); }
        
        .btn-skip { color: var(--warning); border-color: rgba(245, 158, 11, 0.3); } 
        .btn-doubt { color: #a78bfa; border-color: rgba(167, 139, 250, 0.3); }

        /* Options */
        .option-card {
            display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03); border: 2px solid var(--glass-border);
            padding: 16px 20px; border-radius: 16px; cursor: pointer; transition: all 0.2s; margin-bottom: 10px;
        }
        .option-card:hover:not(.disabled) { background: rgba(255,255,255,0.08); border-color: var(--primary); transform: translateX(5px); }
        .option-card.selected { border-color: var(--primary); background: rgba(99, 102, 241, 0.15); }
        .option-card.disabled { opacity: 0.6; pointer-events: none; }
        
        .opt-circle { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--text-muted); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .option-card.selected .opt-circle { border-color: var(--primary); background: var(--primary); }

        /* Results */
        #result-screen { display: none; text-align: center; }
        .score-ring { width: 140px; height: 140px; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; flex-direction: column; background: conic-gradient(var(--primary) 0%, transparent 0%); position: relative; }
        .score-inner { position: absolute; inset: 8px; background: #9640ec; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .review-container { text-align: left; margin-top: 30px; max-height: 350px; overflow-y: auto; padding-right: 10px; }
        .review-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid; }
        .review-item.correct { border-color: var(--success); } .review-item.incorrect { border-color: var(--danger); } .review-item.skipped { border-color: var(--warning); }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="progress-container"><div class="progress-fill" id="progress-bar"></div></div>

        <div id="start-screen" style="text-align: center;">
            <span style="background:rgba(255,255,255,0.1); padding:5px 10px; border-radius:20px; font-size:0.8rem;">Frontend Certification</span>
            <h1>Quiz Portal</h1>
            <p style="color:var(--text-muted); margin-bottom:30px;">15 Questions • 5 Minutes • 85% Passing</p>
            <div class="stats-grid">
                <div class="stat-box"><span class="stat-val">15</span><span class="stat-lbl">Questions</span></div>
                <div class="stat-box"><span class="stat-val">5:00</span><span class="stat-lbl">Time</span></div>
                <div class="stat-box"><span class="stat-val">85%</span><span class="stat-lbl">Pass Score</span></div>
            </div>
            <button id="start-btn" class="btn btn-primary">Start Assessment</button>
        </div>

        <div id="quiz-interface" style="display:none;">
            <div class="quiz-top-bar">
                <div style="font-size:0.9rem; color:var(--text-muted);">
                    <span id="q-counter">Q 1/15</span> • <span id="tracker"></span>
                </div>
                <button onclick="endQuiz()" class="finish-btn-top">Finish Test</button>
            </div>

            <h2 id="question-text" style="font-size:1.4rem; margin-bottom:25px; line-height:1.4;"></h2>
            <div id="options-box"></div>

            <div style="margin-top:30px; padding-top:20px; border-top:1px solid var(--glass-border); display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; gap:10px;">
                    <button id="skip-btn" class="btn btn-ghost btn-skip">Skip</button>
                    <button id="doubt-btn" class="btn btn-ghost btn-doubt">Mark Doubt</button>
                    <button id="next-btn" class="btn btn-primary" style="display:none; padding:10px 30px;">Next</button>
                </div>
                <div style="font-weight:700; font-size:1.1rem;">⏳ <span id="timer">05:00</span></div>
            </div>
        </div>

        <div id="result-screen">
            <div class="score-ring" id="score-ring-ui">
                <div class="score-inner">
                    <span style="font-size:2rem; font-weight:800;" id="final-percent">0%</span>
                    <span style="font-size:0.7rem; text-transform:uppercase; color:var(--text-muted);">Score</span>
                </div>
            </div>
            <h2 id="result-msg"></h2>
            <p id="score-details" style="color:var(--text-muted); margin-bottom:20px;"></p>
            <div class="review-container">
                <h4 style="margin-bottom:15px;">Detailed Review</h4>
                <div id="review-list"></div>
            </div>
            <button onclick="location.reload()" class="btn btn-primary" style="margin-top:20px;">Retake Quiz</button>
        </div>
    </div>

<script>
    const questions = [
        { q: "Which tag is used to create a hyperlink?", a:["<link>","<a>","<href>","<p>"], correct:1 },
        { q: "Which HTML element defines important text?", a:["<strong>","<b>","<i>","<important>"], correct:0 },
        { q: "What does HTML stand for?", a:["Hyper Trainer","HyperText Markup Language","HighText","None"], correct:1 },
        { q: "Which attribute sets image source?", a:["href","src","link","img"], correct:1 },
        { q: "What is the line break tag?", a:["<br>","<lb>","<hr>","<break>"], correct:0 },
        { q: "Which tag is used for an ordered (numbered) list?", a:["<ul>","<ol>","<li>","<num>"], correct:1 },
        { q: "Which tag defines the largest heading?", a:["<h6>","<h1>","<head>","<header>"], correct:1 },
        { q: "Which tag creates a horizontal line?", a:["<line>","<hr>","<br>","<border>"], correct:1 },
        { q: "Which tag defines a table row?", a:["<td>","<th>","<tr>","<row>"], correct:2 },
        { q: "Which attribute provides alternate text for an image?", a:["alt","title","name","desc"], correct:0 },
        { q: "CSS stands for?", a:["Creative Style Sheets","Cascading Style Sheets","Computer Style System","Colorful Style Sheets"], correct:1 },
        { q: "Which CSS property controls text size?", a:["font-style","text-size","font-size","size"], correct:2 },
        { q: "Which symbol is used for an ID selector in CSS?", a:[".","#","@","%"], correct:1 },
        { q: "Which tag is used to embed video content?", a:["<media>","<video>","<movie>","<vid>"], correct:1 },
        { q: "What input type is used for file selection?", a:["file","upload","choose","picker"], correct:0 },
        { q: "Which element is used for the footer of a document?", a:["<footer>","<bottom>","<foot>","<end>"], correct:0 },
        { q: "Where can JavaScript code be placed in an HTML document?", a:["head","body","both","none"], correct:2 },
        { q: "What is the correct tag for a checkbox?", a:["<checkbox>","<input type='check'>","<input type='checkbox'>","<box>"], correct:2 }
    ];

    let quiz = [], index = 0, timer, timeLeft = 300, selected = false;

    document.getElementById("start-btn").addEventListener("click", () => {
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("quiz-interface").style.display = "block";
        
        let allQ = questions.map(q => ({...q, userChoice: null, status: 'unattempted'}));
        for(let i = allQ.length-1; i>0; i--){
            const j = Math.floor(Math.random()*(i+1));
            [allQ[i], allQ[j]] = [allQ[j], allQ[i]];
        }
        quiz = allQ.slice(0, 15);
        startTimer(); loadQuestion();
    });

    function startTimer(){
        timer = setInterval(() => {
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById("timer").textContent = `${m}:${s<10?'0'+s:s}`;
            timeLeft--;
            if(timeLeft < 0) endQuiz();
        }, 1000);
    }

    function loadQuestion() {
        selected = false;
        const q = quiz[index];
        document.getElementById("q-counter").innerText = `Q ${index+1}/${quiz.length}`;
        document.getElementById("tracker").innerText = `Doubt: ${quiz.filter(x=>x.status=='doubted').length} | Skip: ${quiz.filter(x=>x.status=='skipped').length}`;
        document.getElementById("progress-bar").style.width = `${((index)/quiz.length)*100}%`;
        document.getElementById("question-text").textContent = `${index+1}. ${q.q}`;

        const optBox = document.getElementById("options-box");
        optBox.innerHTML = "";
        
        // Reset Buttons
        const nextBtn = document.getElementById("next-btn");
        nextBtn.style.display = "none";
        document.getElementById("skip-btn").style.display = "inline-block";
        
        // ** CRITICAL FIX: Change Next to Submit on last question **
        if (index === quiz.length - 1) {
            nextBtn.textContent = "Submit Quiz";
            nextBtn.style.background = "#10b981"; // Green for submit
        } else {
            nextBtn.textContent = "Next";
            nextBtn.style.background = ""; // Default Primary
        }

        const doubtBtn = document.getElementById("doubt-btn");
        if(q.status === 'doubted') {
            doubtBtn.textContent = "Unmark Doubt"; doubtBtn.style.color = "#fff"; doubtBtn.style.background = "rgba(167, 139, 250, 0.3)";
        } else {
            doubtBtn.textContent = "Mark Doubt"; doubtBtn.style.color = ""; doubtBtn.style.background = "";
        }

        if(q.userChoice !== null) {
            nextBtn.style.display = "inline-block";
            document.getElementById("skip-btn").style.display = "none";
            selected = true;
        }

        q.a.forEach((optStr, i) => {
            const div = document.createElement("div");
            div.className = "option-card";
            div.innerHTML = `<div class='opt-circle'></div><span style='font-size:1.05rem'></span>`; // innerHTML for structure
            div.querySelector("span").textContent = optStr; // textContent for tags safety

            if(q.userChoice === i) div.classList.add("selected");
            if(q.userChoice !== null) div.classList.add("disabled");

            div.addEventListener("click", () => {
                if(selected) return;
                selected = true;
                Array.from(optBox.children).forEach(c => { c.classList.remove("selected"); c.classList.add("disabled"); });
                div.classList.add("selected"); div.classList.remove("disabled");
                
                q.userChoice = i;
                q.status = q.status === 'doubted' ? 'doubted' : 'attempted';
                nextBtn.style.display = "inline-block";
                document.getElementById("skip-btn").style.display = "none";
            });
            optBox.appendChild(div);
        });
    }

    document.getElementById("next-btn").addEventListener("click", () => {
        // If on last question, submit
        if (index === quiz.length - 1) {
            endQuiz();
        } else {
            index++;
            loadQuestion();
        }
    });

    document.getElementById("skip-btn").addEventListener("click", () => {
        const q = quiz[index];
        if(q.userChoice === null && q.status !== 'doubted') q.status = 'skipped';
        
        index++; if(index >= quiz.length) index = 0;
        let start = index;
        while(quiz[index].userChoice !== null && quiz[index].status !== 'doubted') {
            index++; if(index >= quiz.length) index = 0;
            if(index === start) break;
        }
        if(quiz.every(x => x.userChoice !== null || x.status === 'skipped') && index === start && quiz[index].userChoice !== null) endQuiz();
        else loadQuestion();
    });

    document.getElementById("doubt-btn").addEventListener("click", () => {
        const q = quiz[index];
        q.status = (q.status === 'doubted') ? (q.userChoice!==null?'attempted':'unattempted') : 'doubted';
        loadQuestion();
    });

    function endQuiz() {
        clearInterval(timer);
        document.getElementById("quiz-interface").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.getElementById("progress-bar").style.width = "100%";

        let score = 0;
        const list = document.getElementById("review-list");
        list.innerHTML = "";

        quiz.forEach((q, i) => {
            const isCorrect = (q.userChoice === q.correct);
            if(isCorrect) score++;
            let status = q.userChoice === null ? "skipped" : (isCorrect ? "correct" : "incorrect");
            
            const div = document.createElement("div");
            div.className = `review-item ${status}`;
            div.innerHTML = `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><strong>Q${i+1}</strong> <span style="text-transform:uppercase; font-size:0.75rem; font-weight:700;">${status}</span></div><div style="margin-bottom:8px;">${q.q}</div>`;
            
            const ansDiv = document.createElement("div");
            ansDiv.style.fontSize = "0.9rem"; ansDiv.style.color = "var(--text-muted)";
            
            const uSpan = document.createElement("span"); uSpan.textContent = q.userChoice!==null?q.a[q.userChoice]:"Skipped";
            const cSpan = document.createElement("span"); cSpan.textContent = q.a[q.correct]; cSpan.style.color = "var(--success)"; cSpan.style.fontWeight = "bold";

            ansDiv.appendChild(document.createTextNode("Your Ans: ")); ansDiv.appendChild(uSpan);
            ansDiv.appendChild(document.createElement("br"));
            ansDiv.appendChild(document.createTextNode("Correct: ")); ansDiv.appendChild(cSpan);
            div.appendChild(ansDiv);
            list.appendChild(div);
        });

        const percent = Math.round((score / quiz.length) * 100);
        const pass = percent >= 85;
        const color = pass ? "#10b981" : "#ef4444";
        
        document.getElementById("score-ring-ui").style.background = `conic-gradient(${color} ${percent}%, rgba(255,255,255,0.1) ${percent}% 100%)`;
        document.getElementById("final-percent").textContent = `${percent}%`;
        document.getElementById("final-percent").style.color = color;
        document.getElementById("result-msg").textContent = pass ? "You Passed! 🎉" : "Failed 😢";
        document.getElementById("result-msg").style.color = color;
        document.getElementById("score-details").textContent = `You got ${score} out of ${quiz.length} correct.`;
    }
</script>
</body>
</html>
